name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Tag: $TAG"

      - name: Check if tag exists
        id: tag_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh api "repos/${{ github.repository }}/git/refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Build
        run: |
          xcodebuild -project VideoScreenSaver.xcodeproj \
            -target VideoScreenSaver \
            -configuration Release \
            build \
            SYMROOT=build \
            MACOSX_DEPLOYMENT_TARGET=14.0

      - name: Package
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="VideoScreenSaver-${VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent build/Release/VideoScreenSaver.saver "$ARCHIVE"
          SHA=$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Create release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            "${{ steps.package.outputs.archive }}" \
            --title "$TAG" \
            --generate-notes

      - name: Upload to existing release
        if: steps.tag_check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release upload "$TAG" "${{ steps.package.outputs.archive }}" --clobber 2>/dev/null || true

      - name: Update Homebrew cask
        uses: actions/github-script@v7
        env:
          HOMEBREW_PAT: ${{ secrets.HOMEBREW_PAT }}
        with:
          github-token: ${{ secrets.HOMEBREW_PAT }}
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const tag = '${{ steps.version.outputs.tag }}';
            const sha256 = '${{ steps.package.outputs.sha256 }}';
            const owner = 'GeneralD';
            const tapRepo = 'homebrew-tap';
            const caskPath = 'Casks/video-screen-saver.rb';

            const url = `https://github.com/GeneralD/VideoScreenSaver/releases/download/${tag}/VideoScreenSaver-${version}.zip`;

            const caskContent = `cask "video-screen-saver" do
              version "${version}"
              sha256 "${sha256}"

              url "${url}"
              name "VideoScreenSaver"
              desc "macOS screensaver that plays a video file in a loop"
              homepage "https://github.com/GeneralD/VideoScreenSaver"

              screen_saver "VideoScreenSaver.saver"
            end
            `;

            let existingSha;
            try {
              const { data } = await github.rest.repos.getContent({
                owner, repo: tapRepo, path: caskPath,
              });
              existingSha = data.sha;
            } catch (e) {
              existingSha = undefined;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo: tapRepo,
              path: caskPath,
              message: `Update video-screen-saver to ${version}`,
              content: Buffer.from(caskContent).toString('base64'),
              sha: existingSha,
              branch: 'master',
            });

            console.log(`Updated cask to ${version}`);
